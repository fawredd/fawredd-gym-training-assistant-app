openapi: 3.0.3
info:
  title: Clinical — Patient Management System API (Baseline)
  description: |
    **Status:** BASELINE DRAFT — generated by technical-ba from reverse engineering of existing PHP flat-file application.
    
    This document represents the *discovered* endpoint contract, not an ideal REST design.
    It maps all existing `GET`/`POST` PHP handlers to REST-style paths for documentation and future refactoring.
    
    **Source:** `/home/usuario01/vscode/clinical/` — PHP 7.4 / MariaDB 10.4
    **Date:** 2026-03-16
    **Author:** technical-ba (AI Dev Team)
    
    > All endpoints currently use PHP session cookies for authentication.
    > No JWT or token-based auth exists yet.
  version: 0.1.0-baseline
  contact:
    name: technical-ba (AI Dev Team)

servers:
  - url: http://localhost/clinical
    description: Local development (PHP built-in server or Apache/Nginx)
  - url: http://localhost:8080
    description: Docker Compose (proposed)

tags:
  - name: auth
    description: Authentication and account management
  - name: patients
    description: Patient CRUD and demographics
  - name: clinical-history
    description: Clinical history entries and evolution notes
  - name: nutrition
    description: Nutritional assessments and dietary indications
  - name: messaging
    description: Internal institution messaging (admin)
  - name: users
    description: User and staff management (admin)
  - name: files
    description: File attachments for clinical and nutritional records

# ─────────────────────────────────────────────
# SECURITY SCHEME
# ─────────────────────────────────────────────
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: PHPSESSID
      description: PHP session cookie. Must be present for all protected endpoints.

  schemas:
    Error:
      type: object
      properties:
        mensaje:
          type: string
          example: Usuario o contraseña incorrectos.
        url:
          type: string
          example: /clinical/login.php

    Usuario:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        apellido:
          type: string
        email:
          type: string
          format: email
        tipousuario:
          type: integer
          enum: [1, 2]
          description: "1 = Admin, 2 = Professional"
        activo:
          type: integer
          enum: [0, 1, 2]
          description: "0 = unverified, 1 = active, 2 = pending re-verification"
        matricula:
          type: string
          nullable: true
        especialidad:
          type: string
          nullable: true
        id_empresa:
          type: integer

    Paciente:
      type: object
      required: [tipodocumento, documento, nombre, apellido, id_empresa, usuariocreacion]
      properties:
        id:
          type: integer
        tipodocumento:
          type: integer
        documento:
          type: string
          maxLength: 9
        nombre:
          type: string
        apellido:
          type: string
        sexo:
          type: integer
          nullable: true
          enum: [0, 1]
        fechanacimiento:
          type: string
          format: date
          nullable: true
        direccion:
          type: string
          nullable: true
        provincia:
          type: string
          nullable: true
        localidad:
          type: string
          nullable: true
        codigopostal:
          type: string
          nullable: true
        telefono:
          type: string
          nullable: true
        celular:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        gruposanguineo:
          type: string
          nullable: true
        obrasocial:
          type: string
          nullable: true
        numeroafiliado:
          type: string
          nullable: true
        comentarios:
          type: string
          nullable: true
        id_empresa:
          type: integer
        responsable_nombre:
          type: string
        responsable_doc:
          type: string
        responsable_tel:
          type: string
        responsable_email:
          type: string
        responsable_dir:
          type: string
        fechaalta:
          type: string
          format: date
          nullable: true
        fechafallecimiento:
          type: string
          format: date
          nullable: true
        fechabaja:
          type: string
          format: date
          nullable: true

    HistoriaClinica:
      type: object
      properties:
        id:
          type: integer
        paciente:
          type: integer
          description: FK → mm_pacientes.id
        usuariocarga:
          type: integer
          description: FK → mm_usuarios.id
        fechacarga:
          type: string
          format: date
        comentarios:
          type: string

    FichaHistoria:
      type: object
      properties:
        id:
          type: integer
        historiaclinica:
          type: integer
        fechaficha:
          type: string
          format: date
        horacarga:
          type: string
          format: time
        usuariocarga:
          type: integer
        datos:
          type: string
          description: Evolution text
        comentario:
          type: string

    FichaNutri:
      type: object
      properties:
        id:
          type: integer
        historiaclinica:
          type: integer
        fechaficha:
          type: string
          format: date
        diagnostico:
          type: string
          nullable: true
        antecedentes:
          type: string
          nullable: true
        pa:
          type: string
          nullable: true
          description: Blood pressure
        t:
          type: string
          nullable: true
          description: Weight (kg)
        tEstimada:
          type: string
          nullable: true
          description: Estimated weight
        bmi:
          type: string
          nullable: true
        ph:
          type: string
          nullable: true
          description: Ideal weight
        pcp:
          type: string
          nullable: true
          description: Percent current weight
        diagnosticoNutricional:
          type: string
          nullable: true
        laboratorio:
          type: string
          nullable: true
        masticacion:
          type: string
          nullable: true
        deglucion:
          type: string
          nullable: true
        asistencia:
          type: string
          nullable: true
        indicacion:
          type: string
          nullable: true
        suplementacion:
          type: string
          nullable: true
        colaciones:
          type: string
          nullable: true
        comentario:
          type: string
          nullable: true

    Indicacion:
      type: object
      properties:
        id:
          type: integer
        historiaclinica:
          type: integer
        fechaficha:
          type: string
          format: date
        comentario:
          type: string
        movimientos:
          type: array
          items:
            $ref: '#/components/schemas/IndicacionMov'

    IndicacionMov:
      type: object
      properties:
        id:
          type: integer
        indicacion:
          type: integer
        medicacion:
          type: string
          nullable: true
        desayuno:
          type: string
          nullable: true
        almuerzo:
          type: string
          nullable: true
        merienda:
          type: string
          nullable: true
        cena:
          type: string
          nullable: true
        "22hs":
          type: string
          nullable: true

    Mensaje:
      type: object
      properties:
        id:
          type: integer
        mensaje:
          type: string
        fecha_carga:
          type: string
          format: date
        id_empresa:
          type: integer
        usuario_carga:
          type: integer

# ─────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────

paths:

  # ── AUTH ──────────────────────────────────

  /checklogin.php:
    post:
      tags: [auth]
      summary: Authenticate user
      description: |
        Validates email + password against mm_usuarios. Sets PHP session on success.
        **Security Note:** Currently uses raw string interpolation in SQL — SQL injection risk. Prepared statements required.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '303':
          description: Redirect to panel-control.php (success) or mensaje.php (failure)
        '400':
          description: Invalid credentials

  /logout.php:
    get:
      tags: [auth]
      summary: Destroy session
      security:
        - sessionCookie: []
      responses:
        '303':
          description: Redirect to login.php

  /registro.php:
    post:
      tags: [auth]
      summary: Register new user (self-registration)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Usuario'
      responses:
        '303':
          description: Redirect to verification page

  /verifica_usuario.php:
    post:
      tags: [auth]
      summary: Verify user email via token
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
      responses:
        '303':
          description: Redirect on success or failure

  /password_recover.php:
    post:
      tags: [auth]
      summary: Initiate password recovery
      description: |
        **Security Note:** Current implementation may send or expose passwords in plaintext.
        Requires migration to single-use token with expiry (random_bytes + hash).
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
      responses:
        '303':
          description: Redirect with confirmation message

  # ── PATIENTS ──────────────────────────────

  /form_listado_pacientes.php:
    get:
      tags: [patients]
      summary: List all patients for the authenticated user's empresa
      security:
        - sessionCookie: []
      responses:
        '200':
          description: HTML page with patient list
        '303':
          description: Redirect to login if unauthenticated

  /carga_nuevo_paciente.php:
    post:
      tags: [patients]
      summary: Create a new patient record
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Paciente'
      responses:
        '303':
          description: Redirect on success or error

  /carga_datos_pacientes.php:
    post:
      tags: [patients]
      summary: Update an existing patient record
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Paciente'
      responses:
        '303':
          description: Redirect on success

  /form_elimina_datos_pacientes.php:
    get:
      tags: [patients]
      summary: Delete a patient record
      description: |
        **Security Note:** Using GET for delete is an anti-pattern and is vulnerable to CSRF.
        Should be replaced with POST + CSRF token.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '303':
          description: Redirect on success

  # ── CLINICAL HISTORY ──────────────────────

  /form_muestra_datos_historia.php:
    get:
      tags: [clinical-history]
      summary: Show clinical history for a patient
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: query
          required: true
          description: historia_clinica ID
          schema:
            type: integer
      responses:
        '200':
          description: HTML page with history details

  /carga_datos_evolucion.php:
    post:
      tags: [clinical-history]
      summary: Add an evolution entry to a clinical history
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/FichaHistoria'
                - type: object
                  properties:
                    archivo:
                      type: string
                      format: binary
                      description: Optional file attachment
      responses:
        '303':
          description: Redirect on success

  /carga_comentario_historia.php:
    post:
      tags: [clinical-history]
      summary: Add a comment to a history entry
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                id:
                  type: integer
                comentario:
                  type: string
      responses:
        '303':
          description: Redirect on success

  # ── NUTRITION ─────────────────────────────

  /form_muestra_datos_nutricion.php:
    get:
      tags: [nutrition]
      summary: Show nutritional assessment for a clinical history
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: HTML page with nutritional ficha

  /carga_datos_nutricion.php:
    post:
      tags: [nutrition]
      summary: Save nutritional assessment ficha
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              allOf:
                - $ref: '#/components/schemas/FichaNutri'
                - type: object
                  properties:
                    archivo:
                      type: string
                      format: binary
      responses:
        '303':
          description: Redirect on success

  /form_muestra_indicaciones.php:
    get:
      tags: [nutrition]
      summary: Show dietary indications for a clinical history
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: HTML page with indications

  /carga_datos_indicacion.php:
    post:
      tags: [nutrition]
      summary: Save dietary indication and its meal-line details
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Indicacion'
      responses:
        '303':
          description: Redirect on success

  # ── MESSAGING ─────────────────────────────

  /carga_nuevo_mensaje.php:
    post:
      tags: [messaging]
      summary: Post a new internal message (Admin only)
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [mensaje]
              properties:
                mensaje:
                  type: string
      responses:
        '303':
          description: Redirect to panel-control.php

  /elimina_comentario.php:
    get:
      tags: [messaging]
      summary: Delete an internal message (Admin only)
      description: |
        **Security Note:** GET-based delete without CSRF token. 
        Any user who loads this URL (e.g. via a link in an email) will delete the message.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '303':
          description: Redirect to panel-control.php

  # ── USER MANAGEMENT ───────────────────────

  /form_listado_usuarios.php:
    get:
      tags: [users]
      summary: List all users (Admin only)
      security:
        - sessionCookie: []
      responses:
        '200':
          description: HTML page with user list

  /carga_nuevo_usuario.php:
    post:
      tags: [users]
      summary: Create a new user (Admin only)
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Usuario'
      responses:
        '303':
          description: Redirect on success

  /carga_datos_usuario.php:
    post:
      tags: [users]
      summary: Update an existing user (Admin only)
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Usuario'
      responses:
        '303':
          description: Redirect on success

  /form_elimina_datos_usuario.php:
    get:
      tags: [users]
      summary: Delete a user (Admin only)
      description: |
        **Security Note:** GET-based delete — same CSRF risk as elimina_comentario.php.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: query
          required: true
          schema:
            type: integer
      responses:
        '303':
          description: Redirect on success
